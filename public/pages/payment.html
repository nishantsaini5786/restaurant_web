<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - BHOSDIKA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a0505 0%, #1a0a0a 100%);
      font-family: 'Inter', sans-serif;
      color: #f5e7d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .payment-card {
      background: rgba(20, 10, 10, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(212, 175, 55, 0.4);
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      animation: fadeIn 0.5s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .order-id { font-family: 'Cinzel', serif; font-size: 1.5rem; color: #D4AF37; margin: 1rem 0; }
    .bill-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .pay-options { display: flex; gap: 1rem; margin: 1.5rem 0; }
    .pay-btn { flex: 1; padding: 12px; border-radius: 40px; border: 1px solid #D4AF37; background: transparent; color: #D4AF37; cursor: pointer; transition: 0.2s; }
    .pay-btn:hover { background: rgba(212,175,55,0.2); }
  </style>
</head>
<body>
  <div class="payment-card">
    <i class="fas fa-check-circle" style="font-size: 3rem; color: #4caf50;"></i>
    <h1>Order Confirmed!</h1>
    <div class="order-id" id="orderId">---</div>
    <div id="billDetails"></div>
    <div class="pay-options">
      <button class="pay-btn" onclick="payAtCounter()"><i class="fas fa-store"></i> Pay at Counter</button>
      <button class="pay-btn" onclick="payOnline()"><i class="fas fa-mobile-alt"></i> Pay Online (2% off)</button>
    </div>
    <a href="/" style="color:#c9aa5f; margin-top:1rem; display:inline-block;">← New Order</a>
  </div>
  <script>
    const order = JSON.parse(sessionStorage.getItem('lastOrder') || '{}');
    if (!order.orderId) window.location.href = '/';
    document.getElementById('orderId').innerText = order.orderId;
    const subtotal = order.finalAmount - (order.gstAmount || 0);
    document.getElementById('billDetails').innerHTML = `
      <div class="bill-row"><span>Subtotal</span><span>₹${subtotal.toFixed(2)}</span></div>
      ${order.gstAmount ? `<div class="bill-row"><span>GST 18%</span><span>₹${order.gstAmount.toFixed(2)}</span></div>` : ''}
      <div class="bill-row" style="font-weight:bold;font-size:1.2rem"><span>Total</span><span>₹${order.finalAmount.toFixed(2)}</span></div>
    `;
    function payAtCounter() { alert('Show this order ID at counter. Thank you!'); }
    async function payOnline() {
      const res = await fetch(`/api/orders/${order.orderId}/pay-online`, { method: 'POST' });
      const data = await res.json();
      if (data.success) alert(`Payment successful! Discount applied. Final: ₹${data.finalAmount}`);
      else alert('Payment failed');
    }
  </script>
</body>
</html>
