<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - BHOSDIKA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Inter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #0a0505 0%, #1a0a0a 100%);
      font-family: 'Inter', sans-serif; 
      color: #f5e7d9; 
      min-height: 100vh;
    }
    
    /* Login Box */
    .login-box { 
      max-width: 400px; 
      margin: 100px auto; 
      background: rgba(31, 17, 17, 0.95);
      backdrop-filter: blur(10px);
      padding: 2rem; 
      border-radius: 1rem; 
      text-align: center;
      border: 1px solid rgba(212, 175, 55, 0.5);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .login-box h2 {
      font-family: 'Cinzel', serif;
      color: #D4AF37;
      margin-bottom: 1rem;
    }
    .login-box input { 
      padding: 12px; 
      width: 100%; 
      margin: 10px 0; 
      background: #2a1a1a; 
      border: 1px solid #D4AF37; 
      color: white; 
      border-radius: 8px;
      font-size: 1rem;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 1rem;
    }
    
    /* Dashboard */
    .dashboard-container { padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .dashboard-header h1 {
      font-family: 'Cinzel', serif;
      color: #D4AF37;
      font-size: 1.8rem;
    }
    .logout-btn {
      background: rgba(198, 40, 40, 0.8);
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .logout-btn:hover { background: #c62828; }
    
    /* Stats Cards */
    .stats { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); 
      gap: 1rem; 
      margin-bottom: 2rem; 
    }
    .stat-card { 
      background: linear-gradient(145deg, #1f1111, #180d0d);
      border-radius: 1rem; 
      padding: 1.2rem; 
      text-align: center; 
      border: 1px solid rgba(212,175,55,0.3);
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); border-color: #D4AF37; }
    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #D4AF37;
      margin: 0.5rem 0;
    }
    .stat-card .stat-label { color: #c9aa5f; font-size: 0.85rem; }
    
    /* Tabs */
    .admin-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(212,175,55,0.3);
      padding-bottom: 0.5rem;
    }
    .admin-tab {
      padding: 10px 24px;
      background: transparent;
      border: none;
      color: #c9aa5f;
      cursor: pointer;
      font-size: 1rem;
      font-family: 'Cinzel', serif;
      transition: 0.2s;
      border-radius: 8px 8px 0 0;
    }
    .admin-tab.active {
      background: rgba(212,175,55,0.2);
      color: #D4AF37;
      border-bottom: 2px solid #D4AF37;
    }
    .admin-tab:hover { color: #D4AF37; }
    
    /* Filters */
    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filters select, .filters input {
      padding: 8px 12px;
      background: #2a1a1a;
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 8px;
      color: white;
    }
    
    /* Table */
    .table-container {
      overflow-x: auto;
      background: #1a0e0e;
      border-radius: 1rem;
      border: 1px solid rgba(212,175,55,0.2);
      margin-bottom: 2rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { 
      background: rgba(212, 175, 55, 0.1);
      font-family: 'Cinzel', serif;
      color: #D4AF37;
    }
    tr:hover td { background: rgba(212, 175, 55, 0.05); }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .status-pending { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
    .status-completed { background: rgba(76, 175, 80, 0.2); color: #81C784; }
    .status-preparing { background: rgba(33, 150, 243, 0.2); color: #64B5F6; }
    
    .action-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      margin: 2px;
      font-size: 0.75rem;
      transition: 0.2s;
    }
    .btn-complete { background: #2e7d32; color: white; }
    .btn-complete:hover { background: #1b5e20; }
    .btn-paid { background: #1565c0; color: white; }
    .btn-paid:hover { background: #0d47a1; }
    .btn-export { background: #D4AF37; color: #1a0a0a; }
    .btn-view { background: #6a1b9a; color: white; }
    .btn-view:hover { background: #4a148c; }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #c9aa5f;
    }
    
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 10px;
      animation: slideIn 0.3s ease;
    }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c62828; }
    .toast.info { background: #1565c0; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* Customer Details Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #1a0e0e;
      border: 1px solid #D4AF37;
      border-radius: 1rem;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(212,175,55,0.3);
      padding-bottom: 0.5rem;
    }
    .modal-header h3 { color: #D4AF37; font-family: 'Cinzel', serif; }
    .close-modal {
      background: none;
      border: none;
      color: #c9aa5f;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .customer-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    @media (max-width: 768px) {
      .dashboard-container { padding: 1rem; }
      th, td { padding: 8px 10px; font-size: 0.8rem; }
      .admin-tab { padding: 8px 16px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- Login View -->
<div id="loginView" class="login-box">
  <i class="fas fa-crown" style="font-size: 3rem; color: #D4AF37; margin-bottom: 1rem;"></i>
  <h2>Admin Panel</h2>
  <p style="color: #c9aa5f; margin-bottom: 1rem;">BHOSDIKA RESTAURANT</p>
  <input type="password" id="adminPass" placeholder="Enter Password" onkeypress="if(event.key==='Enter') login()">
  <button onclick="login()" class="action-btn btn-complete" style="width:100%; padding:12px;">
    <i class="fas fa-sign-in-alt"></i> Login
  </button>
  <p style="margin-top: 1rem; font-size: 0.75rem; color: #666;">Password: <strong style="color:#D4AF37">salonisaini</strong></p>
</div>

<!-- Dashboard View -->
<div id="dashboard" style="display:none">
  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1><i class="fas fa-tachometer-alt"></i> BHOSDIKA Admin Dashboard</h1>
      <div>
        <button class="action-btn btn-export" onclick="exportToCSV()" style="margin-right: 10px;">
          <i class="fas fa-file-excel"></i> Export CSV
        </button>
        <button class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>
    
    <!-- Stats Cards -->
    <div class="stats" id="stats"></div>
    
    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('orders')">📋 Orders</button>
      <button class="admin-tab" onclick="switchTab('customers')">👥 Customers</button>
    </div>
    
    <!-- Orders Section -->
    <div id="ordersSection">
      <div class="filters">
        <select id="statusFilter" onchange="loadOrders()">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
        <input type="date" id="dateFilter" onchange="loadOrders()">
        <button class="action-btn btn-complete" onclick="clearFilters()" style="background:#666;">
          <i class="fas fa-times"></i> Clear
        </button>
        <button class="action-btn btn-export" onclick="refreshData()">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>
      
      <div class="table-container">
        <table id="ordersTable">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Mobile</th>
              <th>Table</th>
              <th>Items</th>
              <th>Total (₹)</th>
              <th>Status</th>
              <th>Payment</th>
              <th>Time</th>
              <th>Action</th>
             </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="10" style="text-align:center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    
    <!-- Customers Section -->
    <div id="customersSection" style="display:none;">
      <div class="filters">
        <input type="text" id="customerSearch" placeholder="Search by name or mobile..." onkeyup="searchCustomers()" style="flex:1;">
        <button class="action-btn btn-export" onclick="exportCustomersCSV()">
          <i class="fas fa-file-excel"></i> Export CSV
        </button>
        <button class="action-btn btn-export" onclick="loadCustomers()">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>
      
      <div class="table-container">
        <table id="customersTable">
          <thead>
            <tr>
              <th>Customer ID</th>
              <th>Name</th>
              <th>Mobile</th>
              <th>Total Visits</th>
              <th>Total Spent (₹)</th>
              <th>Last Visit</th>
              <th>Favorite Items</th>
              <th>Action</th>
             </tr>
          </thead>
          <tbody id="customersBody">
            <tr><td colspan="8" style="text-align:center">Loading customers...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Customer Details Modal -->
<div id="customerModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-user"></i> Customer Details</h3>
      <button class="close-modal" onclick="closeModal()">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ADMIN PASSWORD - Changed to "salonisaini"
const ADMIN_PASSWORD = 'salonisaini';

let currentTab = 'orders';
let allCustomers = [];

// Login Function
async function login() {
  const pass = document.getElementById('adminPass').value;
  
  if (!pass) {
    showToast('Please enter password', 'error');
    return;
  }
  
  if (pass !== ADMIN_PASSWORD) {
    showToast('Wrong password!', 'error');
    return;
  }
  
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  
  await loadStats();
  await loadOrders();
  await loadCustomers();
  
  showToast('Login successful!', 'success');
}

// Logout Function
function logout() {
  document.getElementById('loginView').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('adminPass').value = '';
  showToast('Logged out successfully', 'info');
}

// Switch Tabs
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.admin-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'orders') || (i === 1 && tab === 'customers'));
  });
  
  if (tab === 'orders') {
    document.getElementById('ordersSection').style.display = 'block';
    document.getElementById('customersSection').style.display = 'none';
    loadOrders();
  } else {
    document.getElementById('ordersSection').style.display = 'none';
    document.getElementById('customersSection').style.display = 'block';
    loadCustomers();
  }
}

// Load Stats
async function loadStats() {
  try {
    const res = await fetch('/api/admin/stats');
    const data = await res.json();
    
    if (data.success) {
      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <i class="fas fa-shopping-bag"></i>
          <div class="stat-value">${data.stats.totalOrders}</div>
          <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-users"></i>
          <div class="stat-value">${data.stats.totalCustomers || 0}</div>
          <div class="stat-label">Total Customers</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-calendar-day"></i>
          <div class="stat-value">${data.stats.todayOrders}</div>
          <div class="stat-label">Today's Orders</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-clock"></i>
          <div class="stat-value">${data.stats.pendingOrders}</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-check-circle"></i>
          <div class="stat-value">${data.stats.completedOrders}</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-rupee-sign"></i>
          <div class="stat-value">₹${data.stats.totalRevenue.toFixed(0)}</div>
          <div class="stat-label">Total Revenue</div>
        </div>
      `;
    }
  } catch (error) {
    console.error('Stats error:', error);
  }
}

// Load Orders
async function loadOrders() {
  try {
    const status = document.getElementById('statusFilter')?.value || 'all';
    const date = document.getElementById('dateFilter')?.value || '';
    
    let url = '/api/admin/orders?limit=100';
    if (status !== 'all') url += `&status=${status}`;
    
    const res = await fetch(url);
    const data = await res.json();
    
    if (!data.success || !data.orders) {
      document.getElementById('ordersBody').innerHTML = '<tr><td colspan="10" class="empty-state">No orders found</td></tr>';
      return;
    }
    
    let orders = data.orders;
    
    if (date) {
      orders = orders.filter(o => new Date(o.createdAt).toDateString() === new Date(date).toDateString());
    }
    
    if (orders.length === 0) {
      document.getElementById('ordersBody').innerHTML = '<tr><td colspan="10" class="empty-state">📭 No orders found</td></tr>';
      return;
    }
    
    document.getElementById('ordersBody').innerHTML = orders.map(o => `
      <tr>
        <td><strong style="color:#D4AF37">${o.orderId}</strong></td>
        <td>${o.customerName}</td>
        <td>${o.mobile}</td>
        <td>T-${o.tableNumber} (${o.tableType})</td>
        <td style="max-width:200px; font-size:0.8rem;">${o.items.map(i => `${i.name} x${i.quantity}`).join(', ')}</td>
        <td><strong>₹${o.finalAmount}</strong></td>
        <td><span class="status-badge status-${o.orderStatus}">${o.orderStatus}</span></td>
        <td><span class="status-badge" style="background:${o.paymentStatus === 'pending' ? 'rgba(255,193,7,0.2)' : 'rgba(76,175,80,0.2)'}; color:${o.paymentStatus === 'pending' ? '#FFC107' : '#81C784'}">${o.paymentStatus === 'pending' ? '⏳ Pending' : '✅ Paid'}</span></td>
        <td style="font-size:0.75rem;">${new Date(o.createdAt).toLocaleString()}</td>
        <td>
          ${o.orderStatus !== 'completed' ? `<button class="action-btn btn-complete" onclick="updateStatus('${o.orderId}', 'completed')"><i class="fas fa-check"></i> Done</button>` : ''}
          ${o.paymentStatus === 'pending' ? `<button class="action-btn btn-paid" onclick="markPaid('${o.orderId}')"><i class="fas fa-rupee-sign"></i> Paid</button>` : ''}
        </td>
      </tr>
    `).join('');
    
  } catch (error) {
    console.error('Load orders error:', error);
    document.getElementById('ordersBody').innerHTML = '<tr><td colspan="10" class="empty-state">Error loading orders</td></tr>';
  }
}

// Load Customers
async function loadCustomers() {
  try {
    const res = await fetch('/api/admin/customers');
    const data = await res.json();
    
    if (data.success && data.customers) {
      allCustomers = data.customers;
      displayCustomers(allCustomers);
      console.log(`✅ Loaded ${allCustomers.length} customers`);
    } else {
      document.getElementById('customersBody').innerHTML = '<tr><td colspan="8" class="empty-state">No customers found</td></tr>';
    }
  } catch (error) {
    console.error('Load customers error:', error);
    document.getElementById('customersBody').innerHTML = '<tr><td colspan="8" class="empty-state">Error loading customers</td></tr>';
  }
}

// Display Customers
function displayCustomers(customers) {
  if (customers.length === 0) {
    document.getElementById('customersBody').innerHTML = '<tr><td colspan="8" class="empty-state">No customers found</td></tr>';
    return;
  }
  
  document.getElementById('customersBody').innerHTML = customers.map(c => `
    <tr>
      <td><small>${c.customerId || '-'}</small></td>
      <td><strong>${c.name}</strong></td>
      <td>${c.mobile}</td>
      <td>${c.totalVisits || 1}</td>
      <td>₹${(c.totalSpent || 0).toFixed(2)}</td>
      <td><small>${c.lastVisit ? new Date(c.lastVisit).toLocaleDateString() : '-'}</small></td>
      <td style="max-width:150px; font-size:0.75rem;">${(c.favoriteItems || []).slice(0, 3).join(', ')}</td>
      <td>
        <button class="action-btn btn-view" onclick="viewCustomerDetails('${c.mobile}')">
          <i class="fas fa-eye"></i> View
        </button>
      </td>
    </tr>
  `).join('');
}

// Search Customers
function searchCustomers() {
  const searchTerm = document.getElementById('customerSearch').value.toLowerCase();
  if (!searchTerm) {
    displayCustomers(allCustomers);
    return;
  }
  
  const filtered = allCustomers.filter(c => 
    c.name.toLowerCase().includes(searchTerm) || 
    c.mobile.includes(searchTerm)
  );
  displayCustomers(filtered);
}

// View Customer Details
async function viewCustomerDetails(mobile) {
  try {
    const res = await fetch(`/api/admin/customers/${mobile}`);
    const data = await res.json();
    
    if (data.success) {
      const customer = data.customer;
      const orders = data.orders || [];
      
      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <div class="customer-detail-row"><strong>Name:</strong> <span>${customer.name}</span></div>
        <div class="customer-detail-row"><strong>Mobile:</strong> <span>${customer.mobile}</span></div>
        <div class="customer-detail-row"><strong>Customer ID:</strong> <span>${customer.customerId || '-'}</span></div>
        <div class="customer-detail-row"><strong>Total Visits:</strong> <span>${customer.totalVisits}</span></div>
        <div class="customer-detail-row"><strong>Total Spent:</strong> <span>₹${(customer.totalSpent || 0).toFixed(2)}</span></div>
        <div class="customer-detail-row"><strong>Last Visit:</strong> <span>${customer.lastVisit ? new Date(customer.lastVisit).toLocaleString() : '-'}</span></div>
        <div class="customer-detail-row"><strong>Favorite Items:</strong> <span>${(customer.favoriteItems || []).join(', ') || '-'}</span></div>
        <div class="customer-detail-row"><strong>Member Since:</strong> <span>${customer.createdAt ? new Date(customer.createdAt).toLocaleDateString() : '-'}</span></div>
        <div style="margin-top: 1rem;">
          <h4 style="color:#D4AF37">Order History (${orders.length})</h4>
          ${orders.length > 0 ? `
            <table style="width:100%; margin-top:0.5rem; font-size:0.8rem;">
              <thead><tr><th>Order ID</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
              <tbody>
                ${orders.map(o => `
                  <tr><td>${o.orderId}</td><td>${new Date(o.createdAt).toLocaleDateString()}</td><td>₹${o.finalAmount}</td><td>${o.orderStatus}</td></tr>
                `).join('')}
              </tbody>
            </table>
          ` : '<p>No orders yet</p>'}
        </div>
      `;
      
      document.getElementById('customerModal').style.display = 'flex';
    }
  } catch (error) {
    showToast('Error loading customer details', 'error');
  }
}

// Close Modal
function closeModal() {
  document.getElementById('customerModal').style.display = 'none';
}

// Update Order Status
async function updateStatus(orderId, status) {
  try {
    const res = await fetch(`/api/admin/orders/${orderId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderStatus: status })
    });
    const data = await res.json();
    
    if (data.success) {
      showToast(`Order ${orderId} marked as ${status}`, 'success');
      await loadOrders();
      await loadStats();
    } else {
      showToast('Update failed', 'error');
    }
  } catch (error) {
    showToast('Error updating order', 'error');
  }
}

// Mark Payment as Paid
async function markPaid(orderId) {
  try {
    const res = await fetch(`/api/admin/orders/${orderId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paymentStatus: 'paid_counter' })
    });
    const data = await res.json();
    
    if (data.success) {
      showToast(`Payment marked as paid for ${orderId}`, 'success');
      await loadOrders();
      await loadStats();
    } else {
      showToast('Update failed', 'error');
    }
  } catch (error) {
    showToast('Error updating payment', 'error');
  }
}

// Export Orders CSV
function exportToCSV() {
  window.open('/api/export-csv', '_blank');
  showToast('Exporting orders to CSV...', 'success');
}

// Export Customers CSV
function exportCustomersCSV() {
  let csvData = "Customer ID,Name,Mobile,Total Visits,Total Spent,Last Visit,Favorite Items,Joined Date\n";
  
  allCustomers.forEach(c => {
    csvData += `"${c.customerId || ''}","${c.name}","${c.mobile}",${c.totalVisits || 1},${c.totalSpent || 0},"${c.lastVisit || ''}","${(c.favoriteItems || []).join('; ')}","${c.createdAt || ''}"\n`;
  });
  
  const blob = new Blob([csvData], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'customers_export.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exporting customers to CSV...', 'success');
}

// Refresh Data
function refreshData() {
  if (currentTab === 'orders') {
    loadOrders();
  } else {
    loadCustomers();
  }
  loadStats();
  showToast('Data refreshed', 'success');
}

// Clear Filters
function clearFilters() {
  if (document.getElementById('statusFilter')) document.getElementById('statusFilter').value = 'all';
  if (document.getElementById('dateFilter')) document.getElementById('dateFilter').value = '';
  if (document.getElementById('customerSearch')) document.getElementById('customerSearch').value = '';
  loadOrders();
  if (currentTab === 'customers') loadCustomers();
}

// Show Toast
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
  toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Auto refresh every 30 seconds
setInterval(() => {
  if (document.getElementById('dashboard').style.display === 'block') {
    if (currentTab === 'orders') {
      loadOrders();
    } else {
      loadCustomers();
    }
    loadStats();
  }
}, 30000);
</script>
